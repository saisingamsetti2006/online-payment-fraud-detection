<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.9);
            padding: 30px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-group {
            position: relative;
            margin: 18px 0;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            appearance: none;
        }
        .form-group input::placeholder {
            color: transparent;
        }
        .form-group label {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #94a3b8;
            font-size: 14px;
            transition: 0.2s;
            pointer-events: none;
        }
        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label,
        .form-group select:focus + label,
        .form-group select:valid + label {
            top: -8px;
            left: 10px;
            font-size: 11px;
            color: #38bdf8;
            background: #1e293b;
            padding: 0 4px;
        }
        select {
            cursor: pointer;
        }
        select option {
            background: white;
            color: black;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .predict-btn {
            background: #38bdf8;
            color: #0f172a;
        }
        .predict-btn:hover {
            background: #0ea5e9;
        }
        .clear-btn {
            background: #475569;
            color: white;
        }
        .clear-btn:hover {
            background: #334155;
        }
        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
        }
        .fraud {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .legit {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>💳 Fraud Detection</h2>
        <form action="/predict" method="post" id="fraudForm">
            <div class="form-group">
                <input type="number" name="step" id="step" value="{{ step or '' }}" placeholder=" " required>
                <label>Transaction Time (step)</label>
            </div>
            <div class="form-group">
                <select name="type" id="type" required>
                    <option value="" disabled {% if not txn_type %}selected{% endif %}></option>
                    <option value="PAYMENT" {% if txn_type=='PAYMENT' %}selected{% endif %}>Payment</option>
                    <option value="TRANSFER" {% if txn_type=='TRANSFER' %}selected{% endif %}>Transfer</option>
                    <option value="CASH_OUT" {% if txn_type=='CASH_OUT' %}selected{% endif %}>Cash Out</option>
                    <option value="DEBIT" {% if txn_type=='DEBIT' %}selected{% endif %}>Debit</option>
                </select>
                <label>Transaction Type</label>
            </div>
            <div class="form-group">
                <input type="number" step="any" name="amount" id="amount" value="{{ amount or '' }}" placeholder=" " required>
                <label>Amount</label>
            </div>
            <div class="form-group">
                <input type="number" step="any" name="oldbalanceOrg" id="oldbalanceOrg" value="{{ oldbalanceOrg or '' }}" placeholder=" " required>
                <label>Sender Balance Before</label>
            </div>
            <div class="form-group">
                <input type="number" step="any" name="newbalanceOrig" id="newbalanceOrig" value="{{ newbalanceOrig or '' }}" placeholder=" " required>
                <label>Sender Balance After</label>
            </div>
            <div class="form-group">
                <input type="number" step="any" name="oldbalanceDest" id="oldbalanceDest" value="{{ oldbalanceDest or '' }}" placeholder=" " required>
                <label>Receiver Balance Before</label>
            </div>
            <div class="form-group">
                <input type="number" step="any" name="newbalanceDest" id="newbalanceDest" value="{{ newbalanceDest or '' }}" placeholder=" " required>
                <label>Receiver Balance After</label>
            </div>
            <div class="button-group">
                <button type="submit" class="predict-btn">Predict</button>
                <button type="button" class="clear-btn" onclick="clearForm()">Clear</button>
            </div>
        </form>

        {% if prediction_text %}
            <div id="resultBox" class="result {{ result_class }}">{{ prediction_text }}</div>
        {% else %}
            <div id="resultBox" class="result" style="display: none;"></div>
        {% endif %}
    </div>
</div>

<script>
function clearForm() {
    document.getElementById('step').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('oldbalanceOrg').value = '';
    document.getElementById('newbalanceOrig').value = '';
    document.getElementById('oldbalanceDest').value = '';
    document.getElementById('newbalanceDest').value = '';
    var typeSelect = document.getElementById('type');
    typeSelect.selectedIndex = 0;
    var resultBox = document.getElementById('resultBox');
    if (resultBox) {
        resultBox.innerHTML = '';
        resultBox.style.display = 'none';
        resultBox.className = 'result';
    }
}
</script>
</body>
</html>
