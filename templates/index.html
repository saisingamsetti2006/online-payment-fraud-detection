<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Payment Fraud Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .fraud {
            background-color: #ffcccc;
            color: #cc0000;
        }
        .legitimate {
            background-color: #ccffcc;
            color: #00cc00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Online Payment Fraud Detection</h1>
        <form method="POST" action="/predict">
            <div class="form-group">
                <label for="step">Step</label>
                <input type="number" id="step" name="step" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="oldbalanceOrg">Old Balance (Origin)</label>
                <input type="number" id="oldbalanceOrg" name="oldbalanceOrg" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="newbalanceOrig">New Balance (Origin)</label>
                <input type="number" id="newbalanceOrig" name="newbalanceOrig" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="oldbalanceDest">Old Balance (Destination)</label>
                <input type="number" id="oldbalanceDest" name="oldbalanceDest" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="newbalanceDest">New Balance (Destination)</label>
                <input type="number" id="newbalanceDest" name="newbalanceDest" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="type">Transaction Type</label>
                <select id="type" name="type" required>
                    <option value="">Select transaction type</option>
                    <option value="CASH_OUT">CASH_OUT</option>
                    <option value="PAYMENT">PAYMENT</option>
                    <option value="CASH_IN">CASH_IN</option>
                    <option value="TRANSFER">TRANSFER</option>
                    <option value="DEBIT">DEBIT</option>
                </select>
            </div>
            <button type="submit">Check Fraud Risk</button>
        </form>
        {% if prediction_text %}
        <div class="result {% if 'Fraud' in prediction_text %}fraud{% else %}legitimate{% endif %}">
            Result: {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
