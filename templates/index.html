<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(30, 41, 59, 0.9);
            padding: 30px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* FORM GROUP */
        .form-group {
            position: relative;
            margin: 18px 0;
        }

        /* INPUT + SELECT SAME STYLE */
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;   /* 🔥 SAME DARK COLOR */
            color: white;
            outline: none;
            appearance: none;      /* 🔥 REMOVE DEFAULT STYLE */
        }

        /* Placeholder hidden for floating */
        .form-group input::placeholder {
            color: transparent;
        }

        /* LABEL */
        .form-group label {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #94a3b8;
            font-size: 14px;
            transition: 0.2s;
            pointer-events: none;
        }

        /* FLOATING EFFECT */
        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label,
        .form-group select:focus + label,
        .form-group select:valid + label {
            top: -8px;
            left: 10px;
            font-size: 11px;
            color: #38bdf8;
            background: #1e293b;
            padding: 0 4px;
        }

        /* DROPDOWN ARROW FIX */
        select {
            cursor: pointer;
        }

        select option {
            background: white;
            color: black;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #0ea5e9;
        }

        /* RESULT */
        .result {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .fraud {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .legit {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

    </style>
</head>

<body>

<div class="container">
<div class="card">

<h2>💳 Fraud Detection</h2>

<form action="/predict" method="post">

<!-- TIME -->
<div class="form-group">
    <input type="number" name="step" value="{{ step or '' }}" placeholder=" " required>
    <label>Transaction Time</label>
</div>

<!-- TYPE (FIXED) -->
<div class="form-group">
    <select name="type" required>
        <option value="" disabled {% if not txn_type %}selected{% endif %}></option>
        <option value="PAYMENT" {% if txn_type=='PAYMENT' %}selected{% endif %}>Payment</option>
        <option value="TRANSFER" {% if txn_type=='TRANSFER' %}selected{% endif %}>Transfer</option>
        <option value="CASH_OUT" {% if txn_type=='CASH_OUT' %}selected{% endif %}>Cash Out</option>
        <option value="DEBIT" {% if txn_type=='DEBIT' %}selected{% endif %}>Debit</option>
    </select>
    <label>Transaction Type</label>
</div>

<!-- AMOUNT -->
<div class="form-group">
    <input type="number" name="amount" value="{{ amount or '' }}" placeholder=" " required>
    <label>Amount</label>
</div>

<!-- SENDER BEFORE -->
<div class="form-group">
    <input type="number" name="oldbalanceOrg" value="{{ oldbalanceOrg or '' }}" placeholder=" " required>
    <label>Sender Balance Before</label>
</div>

<!-- SENDER AFTER -->
<div class="form-group">
    <input type="number" name="newbalanceOrig" value="{{ newbalanceOrig or '' }}" placeholder=" " required>
    <label>Sender Balance After</label>
</div>

<!-- RECEIVER BEFORE -->
<div class="form-group">
    <input type="number" name="oldbalanceDest" value="{{ oldbalanceDest or '' }}" placeholder=" " required>
    <label>Receiver Balance Before</label>
</div>

<!-- RECEIVER AFTER -->
<div class="form-group">
    <input type="number" name="newbalanceDest" value="{{ newbalanceDest or '' }}" placeholder=" " required>
    <label>Receiver Balance After</label>
</div>

<button type="submit">Predict</button>

</form>

<!-- RESULT -->
{% if prediction_text %}
    {% if "Fraud" in prediction_text %}
        <div class="result fraud">⚠️ {{ prediction_text }}</div>
    {% else %}
        <div class="result legit">✅ {{ prediction_text }}</div>
    {% endif %}
{% endif %}

</div>
</div>

</body>
</html>
